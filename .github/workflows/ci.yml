name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn -B package -DskipTests --no-transfer-progress

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: steamtracker
          POSTGRES_USER: steam
          POSTGRES_PASSWORD: steam
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/steamtracker
          SPRING_DATASOURCE_USERNAME: steam
          SPRING_DATASOURCE_PASSWORD: steam
          STEAM_API_KEY: dummy
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: mvn -B test --no-transfer-progress