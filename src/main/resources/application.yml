spring:
  application:
    name: steam-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/steamtracker
    username: steam
    password: steam

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

logging:
  level:
    com.steamtracker.auth: DEBUG

springdoc:
  swagger-ui:
    persist-authorization: true

steam:
  api:
    key: ${STEAM_API_KEY}
    base-url: https://api.steampowered.com

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
server:
  port: 8080